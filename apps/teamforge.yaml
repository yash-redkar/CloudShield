apiVersion: cloudshield.io/v1

kind: Application

metadata:
  name: teamforge

spec:
  repository: https://github.com/yash-redkar/TeamForge

  backendImage: yashredkar/teamforge-backend

  frontendImage: yashredkar/teamforge-frontend

  namespace: teamforge

  replicas: 1

  backend:
    port: 8000

  frontend:
    port: 3000

  env: []

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"

    limits:
      cpu: "500m"
      memory: "512Mi"