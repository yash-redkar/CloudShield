name: CloudShield CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CloudShield
        uses: actions/checkout@v4
        with:
          path: CloudShield

      - name: Checkout TeamForge
        uses: actions/checkout@v4
        with:
          repository: yash-redkar/TeamForge
          path: TeamForge

      - name: Verify workspace
        run: |
          pwd
          ls -la
          ls -la CloudShield
          ls -la TeamForge

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build \
            -t yashredkar/teamforge-backend:${{ github.sha }} \
            ./TeamForge/backend

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api/v1 \
            -t yashredkar/teamforge-frontend:${{ github.sha }} \
            ./TeamForge/frontend

  deploy:
    name: Deploy to Kubernetes

    needs: build

    runs-on: self-hosted

    env:
      KUBECONFIG: /home/ubuntu/.kube/config

    steps:
      - name: Checkout CloudShield
        uses: actions/checkout@v4
        with:
          path: CloudShield

      - name: Verify Runner
        run: |
          whoami
          pwd
          kubectl get nodes          