name: CloudShield CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CloudShield
        uses: actions/checkout@v4
        with:
          path: CloudShield

      - name: Checkout TeamForge
        uses: actions/checkout@v4
        with:
          repository: yash-redkar/TeamForge
          path: TeamForge

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build \
            -t yashredkar/teamforge-backend:${{ github.sha }} \
            ./TeamForge/backend

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api/v1 \
            -t yashredkar/teamforge-frontend:${{ github.sha }} \
            ./TeamForge/frontend

      - name: Push Backend Image
        run: |
          docker push yashredkar/teamforge-backend:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push yashredkar/teamforge-frontend:${{ github.sha }}   

      - name: Verify Backend Image Exists
        run: |
          docker manifest inspect yashredkar/teamforge-backend:${{ github.sha }}

      - name: Verify Frontend Image Exists
        run: |
          docker manifest inspect yashredkar/teamforge-frontend:${{ github.sha }}  

  deploy:
    name: Deploy to Kubernetes

    needs: build

    runs-on: self-hosted

    env:
      KUBECONFIG: /home/ubuntu/.kube/config

    steps:
      - name: Checkout CloudShield
        uses: actions/checkout@v4
        with:
          path: CloudShield 

      - name: Verify Runner
        run: |
          whoami
          kubectl get nodes

      - name: Deploy Backend
        run: |
          kubectl set image deployment/backend \
          backend=yashredkar/teamforge-backend:${{ github.sha }} \
          -n teamforge     
      
      - name: Deploy Frontend
        run: |
          kubectl set image deployment/frontend \
          frontend=yashredkar/teamforge-frontend:${{ github.sha }} \
          -n teamforge

      - name: Wait for Backend Rollout
        run: |
          kubectl rollout status deployment/backend -n teamforge

      - name: Wait for Frontend Rollout
        run: |
          kubectl rollout status deployment/frontend -n teamforge

      - name: Backend Health Check
        run: |
          curl --fail http://localhost/api/v1/healthcheck