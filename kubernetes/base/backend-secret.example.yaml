apiVersion: v1
kind: Secret

metadata:
  name: backend-secret
  namespace: teamforge

type: Opaque

stringData:
  PORT: "8000"
  NODE_ENV: "production"

  MONGO_URI: CHANGE_ME

  ACCESS_TOKEN_SECRET: CHANGE_ME
  REFRESH_TOKEN_SECRET: CHANGE_ME
  ACCESS_TOKEN_EXPIRY: "15m"
